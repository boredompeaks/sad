    <title>Cipher</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
        rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <style>
        /* ═══════════════════════════════════════════════════════
           §1 — DESIGN TOKENS
        ═══════════════════════════════════════════════════════ */
        :root {
            /* Font Stacks */
            --fd: 'Fraunces', Georgia, serif;
            --fb: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --fm: 'DM Sans', system-ui, monospace;

            /* Surface Palette — Deep Space */
            --c0: #030712;
            --c1: #0a0f1e;
            --c2: #111827;
            --c3: #1e293b;
            --c4: #334155;
            --c5: #475569;

            /* Accent — Electric Indigo */
            --a: #6366f1;
            --a2: #818cf8;
            --a3: #a5b4fc;
            --ag: rgba(99, 102, 241, 0.18);
            --ag2: rgba(99, 102, 241, 0.08);

            /* Text — Cool Platinum */
            --t0: #f1f5f9;
            --t1: #cbd5e1;
            --t2: #94a3b8;
            --t3: #64748b;

            /* Sent / Received Bubbles */
            --sb: linear-gradient(135deg, #4338ca 0%, #6366f1 50%, #7c3aed 100%);
            --sb2: rgba(99, 102, 241, 0.30);
            --rb: rgba(255, 255, 255, 0.035);
            --rb2: rgba(255, 255, 255, 0.07);

            /* Semantic Status */
            --green: #22c55e;
            --red: #ef4444;
            --amber: #f59e0b;

            /* Geometry */
            --radius: 24px;
            --radiusS: 16px;
            --radiusXS: 10px;
            --squircle: 22px;

            /* Elevation */
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
            --shadowS: 0 4px 20px rgba(0, 0, 0, 0.30);

            /* Motion */
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --blur: 24px;

            /* Layout */
            --sidebar: 360px;
            --sat: env(safe-area-inset-top, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
            --sal: env(safe-area-inset-left, 0px);
            --sar: env(safe-area-inset-right, 0px);
        }

        /* Minimal light-mode stub (v2 — just token overrides) */
        [data-theme=light] {
            --c0: #f8fafc; --c1: #ffffff; --c2: #f1f5f9;
            --c3: #e2e8f0; --c4: #cbd5e1; --c5: #94a3b8;
            --t0: #0f172a; --t1: #334155; --t2: #64748b; --t3: #94a3b8;
            --sb: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --rb: #ffffff; --rb2: rgba(0,0,0,0.05);
            --shadow: 0 20px 80px rgba(99,102,241,0.08);
        }

        /* ═══════════════════════════════════════════════════════
           §2 — RESET & BASE
        ═══════════════════════════════════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%; overflow: hidden;
            background: var(--c0); color: var(--t0);
            font-family: var(--fb);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .no-select { -webkit-user-select: none; user-select: none; }

        /* Subtle noise texture */
        body::after {
            content: ""; position: fixed; inset: 0; z-index: 9999;
            pointer-events: none; opacity: 0.022;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* Custom scrollbar */
        .scrollable::-webkit-scrollbar { width: 3px; }
        .scrollable::-webkit-scrollbar-track { background: transparent; }
        .scrollable::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }
        .scrollable::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

        /* ═══════════════════════════════════════════════════════
           §3 — UTILITY CLASSES
        ═══════════════════════════════════════════════════════ */
        .squircle { border-radius: var(--squircle); }

        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        button {
            transition: all 0.25s var(--ease); cursor: pointer;
            border: none; background: none;
            color: inherit; font-family: inherit;
        }
        button:active { transform: scale(0.93); opacity: 0.75; }

        input, textarea {
            font-family: var(--fb);
            -webkit-appearance: none; appearance: none;
        }

        /* ═══════════════════════════════════════════════════════
           §4 — SCREEN SYSTEM
        ═══════════════════════════════════════════════════════ */
        .screen {
            position: fixed; inset: 0; display: flex;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
            transform: scale(1.012);
        }
        .screen.active { opacity: 1; pointer-events: all; transform: scale(1); }

        /* ═══════════════════════════════════════════════════════
           §5 — BOOT / SPLASH SCREEN
        ═══════════════════════════════════════════════════════ */
        #s-boot {
            flex-direction: column; align-items: center;
            justify-content: center; gap: 24px;
            background: radial-gradient(ellipse at 50% 40%, rgba(99,102,241,0.07) 0%, transparent 60%), var(--c0);
        }

        .boot-icon {
            width: 108px; height: 108px; position: relative;
        }
        .boot-icon-img {
            width: 100%; height: 100%;
            background: url('favicon.png') center/cover no-repeat;
            border-radius: var(--squircle);
            position: relative; z-index: 1;
            box-shadow: 0 16px 48px rgba(0,0,0,0.4);
        }
        .boot-icon::after {
            content: ''; position: absolute; inset: -14px;
            border-radius: 32px;
            background: radial-gradient(circle, var(--ag) 0%, transparent 70%);
            animation: bootGlow 2.8s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes bootGlow {
            0%, 100% { opacity: 0.4; transform: scale(0.92); }
            50% { opacity: 1; transform: scale(1.06); }
        }

        .boot-logo {
            font-family: var(--fd); font-style: italic;
            font-size: clamp(44px, 10vw, 60px);
            letter-spacing: -1px; color: var(--t0);
        }
        .boot-logo em { color: var(--a); font-style: italic; }

        .boot-progress-track {
            width: 140px; height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px; overflow: hidden;
        }
        #boot-prog {
            height: 100%; width: 0;
            background: linear-gradient(90deg, var(--a), var(--a2));
            border-radius: 3px;
            transition: width 0.5s var(--ease);
            box-shadow: 0 0 14px var(--ag);
        }

        #boot-lbl {
            font-size: 10px; letter-spacing: 0.14em;
            text-transform: uppercase; color: var(--t3);
            font-weight: 700;
        }

        #boot-retry-btn {
            display: none; padding: 12px 28px;
            border-radius: 14px; font-weight: 700;
            font-size: 14px; gap: 8px;
            align-items: center;
        }

        /* ═══════════════════════════════════════════════════════
           §6 — AUTH SCREEN
        ═══════════════════════════════════════════════════════ */
        #s-auth {
            align-items: center; justify-content: center;
            background: var(--c0); overflow: hidden;
        }
        /* Animated mesh gradient */
        #s-auth::before {
            content: ''; position: absolute; inset: -60%;
            background:
                radial-gradient(circle at 25% 30%, rgba(99,102,241,0.10) 0%, transparent 50%),
                radial-gradient(circle at 75% 65%, rgba(124,58,237,0.07) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(67,56,202,0.05) 0%, transparent 60%);
            animation: meshDrift 25s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes meshDrift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(4%, -3%) rotate(1.5deg); }
            66% { transform: translate(-3%, 4%) rotate(-1deg); }
        }

        .auth-card {
            width: 100%; max-width: 420px;
            background: rgba(10, 15, 30, 0.70);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius);
            box-shadow: var(--shadow), 0 0 80px rgba(99,102,241,0.05);
            padding: clamp(24px, 5vw, 40px);
            margin: 20px;
            position: relative; z-index: 1;
            animation: cardEnter 0.7s var(--ease) forwards;
        }
        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auth-brand {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 28px;
        }
        .auth-brand-icon {
            width: 36px; height: 36px;
            background: url('favicon.png') center/cover no-repeat;
            border-radius: 12px;
        }
        .auth-brand-name {
            font-family: var(--fd); font-size: 22px; font-style: italic;
        }
        .auth-brand-name span { color: var(--a); }

        /* Auth tab strip */
        .auth-tabs {
            display: flex; padding: 4px;
            background: rgba(255,255,255,0.04);
            border-radius: 14px; margin-bottom: 24px;
        }
        .ac-tab {
            flex: 1; padding: 11px 0; border-radius: 11px;
            font-size: 14px; font-weight: 600;
            color: var(--t3); text-align: center;
            transition: all 0.35s var(--ease);
            position: relative; z-index: 1;
        }
        .ac-tab.on {
            color: #fff; background: var(--a);
            box-shadow: 0 4px 18px var(--ag);
        }

        /* Auth form */
        .auth-form { display: flex; flex-direction: column; gap: 18px; }

        .field-group { position: relative; }
        .field-label {
            display: block; font-size: 10px; font-weight: 700;
            color: var(--t3); margin-bottom: 7px;
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .field-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 14px 16px; border-radius: 14px;
            color: var(--t0); font-size: 15px; outline: none;
            transition: all 0.3s var(--ease);
        }
        .field-input::placeholder { color: var(--t3); }
        .field-input:focus {
            border-color: var(--a);
            box-shadow: 0 0 0 3px var(--ag);
            background: rgba(255,255,255,0.06);
        }

        .field-pwd-wrap { position: relative; }
        .pt {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%); color: var(--t3);
            padding: 4px;
        }

        .fe {
            color: var(--red); font-size: 11px;
            margin-top: 4px; min-height: 0;
        }

        .av-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .av-dot:hover { filter: brightness(1.2); }

        /* Auth buttons */
        .auth-btn {
            width: 100%; padding: 15px;
            border-radius: 14px; background: var(--sb);
            color: white; font-weight: 700; font-size: 15px;
            display: flex; align-items: center;
            justify-content: center; gap: 10px;
            box-shadow: 0 8px 28px var(--ag);
            transition: all 0.3s var(--ease);
            position: relative; overflow: hidden;
        }
        .auth-btn:hover:not(:disabled) {
            box-shadow: 0 12px 36px rgba(99,102,241,0.30);
            transform: translateY(-1px);
        }
        .auth-btn:active:not(:disabled) { transform: scale(0.97) translateY(0); }
        .auth-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

        .btn-spin {
            display: none; width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.25);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .loading .btn-spin { display: block; }
        .loading .btn-icon { display: none; }
        .btn-icon { display: inline-flex; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .auth-security {
            margin-top: 24px; padding: 14px 16px;
            background: rgba(99,102,241,0.04);
            border: 1px solid rgba(99,102,241,0.08);
            border-radius: 14px;
            display: flex; gap: 12px; align-items: center;
        }
        .auth-security p { font-size: 11px; color: var(--t2); line-height: 1.5; }

        #reg-full {
            color: var(--red); font-size: 12px;
            margin-top: 8px; text-align: center; display: none;
        }
        #rl-msg { color: var(--red); font-size: 12px; text-align: center; }

        /* ═══════════════════════════════════════════════════════
           §7 — APP SHELL
        ═══════════════════════════════════════════════════════ */
        .sidebar {
            background: var(--c1);
            border-right: 1px solid rgba(255,255,255,0.04);
            display: flex; flex-direction: column;
            width: var(--sidebar); position: relative;
        }

        .sb-header {
            padding: calc(20px + var(--sat)) 20px 14px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .sb-brand { display: flex; align-items: center; gap: 10px; }
        .sb-brand-icon {
            width: 30px; height: 30px;
            background: url('favicon.png') center/cover no-repeat;
            border-radius: 10px;
        }
        .sb-brand-name {
            font-family: var(--fd); font-style: italic; font-size: 18px;
        }
        .sb-brand-name span { color: var(--a); }
        .sb-actions { display: flex; gap: 6px; }
        .sb-icon-btn {
            width: 36px; height: 36px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }

        /* Profile card */
        .my-prof {
            margin: 0 12px 14px; padding: 14px;
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 18px;
            display: flex; align-items: center; gap: 12px;
            transition: background 0.3s;
        }
        .my-prof-info { flex: 1; min-width: 0; }
        #my-n {
            font-weight: 700; font-size: 14px;
            color: var(--t0); overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }
        .my-status-row {
            display: flex; align-items: center; gap: 5px;
            font-size: 11px; font-weight: 600; margin-top: 2px;
        }
        .pip {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--t3); flex-shrink: 0;
            transition: all 0.4s var(--ease);
        }
        .pip.online { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.5); }
        .pip.away { background: var(--amber); box-shadow: 0 0 6px rgba(245,158,11,0.4); }

        .sb-section-label {
            font-size: 10px; font-weight: 800;
            letter-spacing: 0.12em; color: var(--t3);
            padding: 4px 24px 10px; text-transform: uppercase;
        }

        /* Contact list */
        #contacts {
            flex: 1; overflow-y: auto;
            overscroll-behavior: contain;
        }
        .c-row {
            transition: background 0.2s var(--ease), transform 0.15s var(--ease) !important;
        }
        .c-row:active { transform: scale(0.98) !important; }
        .c-row.active { background: var(--ag2) !important; }

        /* ═══════════════════════════════════════════════════════
           §8 — AVATAR & PRESENCE
        ═══════════════════════════════════════════════════════ */
        .av {
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: white;
            background: var(--c4); border-radius: 14px;
            flex-shrink: 0;
        }
        .ppip {
            position: absolute; bottom: -1px; right: -1px;
            width: 13px; height: 13px; border-radius: 50%;
            border: 2.5px solid var(--c1);
            background: var(--t3);
            transition: all 0.4s var(--ease);
        }
        .ppip.online {
            background: var(--green);
            box-shadow: 0 0 10px rgba(34,197,94,0.5);
        }
        .ppip.away { background: var(--amber); }

        /* ═══════════════════════════════════════════════════════
           §9 — DROPDOWN MENUS
        ═══════════════════════════════════════════════════════ */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute; right: 0; top: 48px;
            background: rgba(17,24,39,0.92);
            backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            min-width: 180px;
            box-shadow: var(--shadow); border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.06);
            z-index: 2000; overflow: hidden;
        }
        .dropdown.show .dropdown-content {
            display: block;
            animation: dropReveal 0.25s var(--ease);
        }
        @keyframes dropReveal {
            from { opacity: 0; transform: translateY(-6px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .dropdown-item {
            color: var(--t1); padding: 14px 20px;
            display: flex; align-items: center; gap: 12px;
            font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--t0); }

        /* ═══════════════════════════════════════════════════════
           §10 — CHAT PANE
        ═══════════════════════════════════════════════════════ */
        .chat-pane {
            display: flex; flex-direction: column;
            background: var(--c0); position: relative;
        }
        .chat-ui-wrap {
            flex-direction: column; height: 100%;
            padding-bottom: var(--kb-height, 0px);
        }

        /* Chat empty state */
        .chat-empty {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0.15; gap: 8px;
        }
        .chat-empty p { font-weight: 600; font-size: 13px; }

        /* Chat top bar */
        .ct-bar {
            padding: calc(14px + var(--sat)) 16px 12px;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            background: rgba(3,7,18,0.85);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            z-index: 10; position: relative;
        }
        .back-b {
            width: 36px; height: 36px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .ct-info { flex: 1; min-width: 0; }
        #ct-name-el {
            font-weight: 700; font-family: var(--fd);
            font-size: 17px; line-height: 1.2;
        }
        .ct-s {
            font-size: 11px; color: var(--t3); font-weight: 500;
            letter-spacing: 0.03em; transition: color 0.3s;
        }
        .ct-s.online { color: var(--green); }
        .ct-s.away { color: var(--amber); }

        /* Connection / status bars */
        .offline-bar {
            background: linear-gradient(90deg, var(--red), #dc2626);
            color: white; font-size: 11px; font-weight: 800;
            text-align: center; padding: 7px;
            letter-spacing: 0.05em;
        }
        .decoy-bar {
            background: rgba(239,68,68,0.06);
            border-bottom: 1px solid rgba(239,68,68,0.12);
            color: var(--red); font-size: 11px;
            padding: 10px; text-align: center; font-weight: 700;
        }
        .decrypt-prog {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .decrypt-prog-track {
            height: 2px; background: var(--c3);
            border-radius: 2px; overflow: hidden;
        }
        #dp-fill {
            height: 100%; width: 0;
            background: linear-gradient(90deg, var(--a), var(--a2));
            border-radius: 2px;
            transition: width 0.3s var(--ease);
            box-shadow: 0 0 8px var(--ag);
        }
        #dp-lbl {
            font-size: 9px; text-align: center;
            margin-top: 6px; color: var(--t3);
            text-transform: uppercase; letter-spacing: 0.05em;
        }

        /* ═══════════════════════════════════════════════════════
           §11 — MESSAGES
        ═══════════════════════════════════════════════════════ */
        .msgs {
            flex: 1; overflow-y: auto;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            padding: 16px 14px 16px;
            display: flex; flex-direction: column; gap: 3px;
            background-image: radial-gradient(ellipse at 8% 0%, rgba(99,102,241,0.025) 0%, transparent 50%);
        }

        /* Date separators — floating sticky pill */
        .dsep {
            display: flex; justify-content: center;
            padding: 14px 0 8px;
            position: sticky; top: 0; z-index: 5;
        }
        .dsep-lbl {
            background: rgba(10,15,30,0.88);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 5px 16px; border-radius: 20px;
            font-size: 11px; font-weight: 700;
            color: var(--t2); letter-spacing: 0.03em;
        }

        /* Message row */
        .msg-r {
            display: flex; flex-direction: column;
            animation: msgSlide 0.3s var(--ease) both;
        }
        .msg-r.me { align-items: flex-end; }
        .msg-r.them { align-items: flex-start; }
        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(6px) scale(0.985); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Bubble base */
        .bubble {
            max-width: min(80%, 520px); width: fit-content;
            padding: 10px 16px; font-size: 15px; line-height: 1.55;
            position: relative; border-radius: 20px;
            word-break: break-word;
            transition: all 0.2s var(--ease);
        }
        .bubble.pending { opacity: 0.55; }

        /* Sent bubble */
        .msg-r.me .bubble {
            background: var(--sb);
            border: 1px solid var(--sb2);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 18px rgba(99,102,241,0.18);
        }
        /* Received bubble */
        .msg-r.them .bubble {
            background: var(--rb);
            border: 1px solid var(--rb2);
            color: var(--t0);
            border-bottom-left-radius: 6px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }

        /* Bubble grouping — tight radius transitions */
        .msg-r.me.grouped-top .bubble    { border-bottom-right-radius: 6px; margin-bottom: 1px; }
        .msg-r.me.grouped-bottom .bubble { border-top-right-radius: 6px; }
        .msg-r.me.grouped-mid .bubble    { border-top-right-radius: 6px; border-bottom-right-radius: 6px; }
        .msg-r.them.grouped-top .bubble    { border-bottom-left-radius: 6px; margin-bottom: 1px; }
        .msg-r.them.grouped-bottom .bubble { border-top-left-radius: 6px; }
        .msg-r.them.grouped-mid .bubble    { border-top-left-radius: 6px; border-bottom-left-radius: 6px; }

        /* Reply quote inside bubble */
        .reply-quote {
            background: rgba(255,255,255,0.08);
            border-left: 3px solid var(--a2);
            border-radius: 8px; padding: 7px 12px;
            margin-bottom: 6px; cursor: pointer;
            transition: background 0.2s;
        }
        .reply-quote:active { background: rgba(255,255,255,0.14); }
        .reply-quote-name {
            display: block; font-size: 10px; font-weight: 800;
            color: var(--a2); margin-bottom: 2px;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .reply-quote-text {
            display: block; font-size: 13px; color: var(--t2);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* Message text — allow selection */
        .msg-text { -webkit-user-select: text; user-select: text; }

        /* Reactions */
        .msg-reactions { display: flex; gap: 4px; margin-top: 4px; }
        .reaction-chip {
            display: inline-flex; font-size: 18px;
            padding: 2px 8px; border-radius: 12px;
            background: rgba(255,255,255,0.06);
            animation: chipPop 0.3s var(--spring);
        }
        @keyframes chipPop { from { transform: scale(0); } to { transform: scale(1); } }

        /* Message meta (time + receipt) */
        .msg-meta {
            display: flex; align-items: center; gap: 4px;
            margin-top: 3px; font-size: 10px;
            color: var(--t3); opacity: 0.5;
            font-family: var(--fm);
        }
        .msg-r.grouped-top .msg-meta,
        .msg-r.grouped-mid .msg-meta { display: none; }

        /* Read receipts */
        .rc { display: inline-flex; align-items: center; }
        .rc .lucide { width: 14px; height: 14px; }
        .rc.read { color: var(--a2); }
        .rc.pending { opacity: 0.4; }

        /* Flash highlight on scroll-to-reply */
        .msg-flash { animation: msgFlash 1s var(--ease); }
        @keyframes msgFlash {
            0%   { filter: brightness(1); }
            20%  { filter: brightness(1.6); }
            100% { filter: brightness(1); }
        }

        /* ═══════════════════════════════════════════════════════
           §12 — TYPING INDICATOR
        ═══════════════════════════════════════════════════════ */
        .typing-r {
            padding: 0 20px 10px;
            display: flex; align-items: center; gap: 10px;
        }
        .typing-dots {
            padding: 10px 16px; border-radius: 16px;
            display: flex; gap: 5px;
        }
        .td {
            width: 6px; height: 6px;
            background: var(--a2); border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }
        .td:nth-child(2) { animation-delay: 0.15s; }
        .td:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
            30% { transform: translateY(-7px); opacity: 1; }
        }

        /* ═══════════════════════════════════════════════════════
           §13 — REPLY BAR
        ═══════════════════════════════════════════════════════ */
        .reply-bar {
            margin: 0 14px 6px; padding: 12px 14px;
            background: rgba(99,102,241,0.05);
            border-left: 3px solid var(--a);
            border-radius: 14px;
            display: flex; align-items: center; gap: 12px;
            animation: replySlide 0.3s var(--spring);
        }
        @keyframes replySlide {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .reply-bar .reply-name {
            font-size: 10px; font-weight: 800;
            color: var(--a2); text-transform: uppercase;
            margin-bottom: 2px; letter-spacing: 0.04em;
        }
        #reply-text {
            font-size: 12px; color: var(--t2);
            overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap;
        }
        .reply-close-btn {
            width: 28px; height: 28px; flex-shrink: 0;
            background: rgba(255,255,255,0.06); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* ═══════════════════════════════════════════════════════
           §14 — INPUT AREA
        ═══════════════════════════════════════════════════════ */
        .inp-area {
            background: rgba(10,15,30,0.88);
            backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            padding: 10px 14px calc(10px + var(--sab));
            border-top: 1px solid rgba(255,255,255,0.04);
            position: relative;
        }
        .inp-row { display: flex; align-items: flex-end; gap: 10px; }
        .inp-wrap {
            flex: 1; display: flex; align-items: flex-end; gap: 8px;
            background: var(--c2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px; padding: 7px 14px;
            transition: all 0.3s var(--ease);
        }
        .inp-wrap:focus-within {
            border-color: rgba(99,102,241,0.35);
            box-shadow: 0 0 0 3px var(--ag);
            background: rgba(17,24,39,0.95);
        }
        #em-btn { padding: 4px; color: var(--t3); transition: color 0.2s; }
        #em-btn:hover { color: var(--t1); }

        #msg-inp {
            flex: 1; background: none; border: none; outline: none;
            color: var(--t0); font-size: 16px; padding: 4px 0;
            max-height: 140px; line-height: 1.5;
            resize: none; font-family: var(--fb);
        }
        #msg-inp::placeholder { color: var(--t3); }

        /* Send button */
        #send-b {
            width: 46px; height: 46px; flex-shrink: 0;
            border-radius: 50%; background: var(--sb);
            color: white;
            box-shadow: 0 4px 18px var(--ag);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s var(--ease);
        }
        #send-b:disabled {
            opacity: 0.25; box-shadow: none;
            background: var(--c3); transform: none;
        }
        #send-b:not(:disabled):hover {
            box-shadow: 0 8px 28px rgba(99,102,241,0.35);
            transform: scale(1.06);
        }
        #send-b.pop { animation: sendPop 0.3s var(--spring); }
        @keyframes sendPop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.18); }
            100% { transform: scale(1); }
        }

        /* Emoji picker */
        #em-pick {
            position: absolute; bottom: calc(100% + 6px);
            left: 14px; right: 14px;
            background: var(--c2);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 22px; padding: 14px;
            display: none; flex-wrap: wrap; gap: 4px;
            max-height: 220px; overflow-y: auto;
            box-shadow: var(--shadow); z-index: 2000;
            animation: emojiOpen 0.25s var(--spring);
        }
        @keyframes emojiOpen {
            from { opacity: 0; transform: translateY(6px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ═══════════════════════════════════════════════════════
           §15 — JUMP-TO-BOTTOM FAB
        ═══════════════════════════════════════════════════════ */
        #jump-btn {
            position: absolute; bottom: 100px; right: 18px;
            width: 44px; height: 44px;
            background: rgba(17,24,39,0.9);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            box-shadow: var(--shadowS); z-index: 100;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: all 0.2s var(--ease);
        }
        #jump-btn:hover { background: var(--c3); }

        #unread-badge {
            position: absolute; top: -7px; right: -7px;
            background: var(--red); color: white;
            font-size: 10px; font-weight: 900;
            min-width: 20px; height: 20px; border-radius: 10px;
            display: none; align-items: center; justify-content: center;
            border: 2px solid var(--c0);
            animation: badgePop 0.3s var(--spring);
        }
        @keyframes badgePop { from { transform: scale(0); } to { transform: scale(1); } }

        /* ═══════════════════════════════════════════════════════
           §16 — OVERLAY
        ═══════════════════════════════════════════════════════ */
        #overlay {
            position: fixed; inset: 0; z-index: 5000;
            background: rgba(3,7,18,0.88);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 24px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s var(--ease);
        }
        #overlay.show { opacity: 1; pointer-events: all; }
        .ov-ring {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,255,255,0.06);
            border-top-color: var(--a);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
        }
        .ov-txt {
            font-size: 14px; font-weight: 600; color: var(--t1);
            letter-spacing: 0.02em;
        }

        /* ═══════════════════════════════════════════════════════
           §17 — SKELETON SHIMMER
        ═══════════════════════════════════════════════════════ */
        .shimmer {
            background: linear-gradient(
                90deg,
                rgba(255,255,255,0.015) 0%,
                rgba(255,255,255,0.06) 50%,
                rgba(255,255,255,0.015) 100%
            );
            background-size: 200% 100%;
            animation: shimmerSlide 1.6s ease-in-out infinite;
        }
        @keyframes shimmerSlide {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ═══════════════════════════════════════════════════════
           §18 — LUCIDE ICON DEFAULT
        ═══════════════════════════════════════════════════════ */
        .lucide { width: 20px; height: 20px; display: inline-block; }

        /* ═══════════════════════════════════════════════════════
           §19 — RESPONSIVE BREAKPOINTS
        ═══════════════════════════════════════════════════════ */

        /* ── PHONE (<768px) ── */
        @media (max-width: 767px) {
            :root { --sidebar: 100%; }

            .sidebar {
                width: 100%; position: absolute; inset: 0;
                z-index: 10;
                transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
            }
            #s-app.mobile-chat-active .sidebar {
                pointer-events: none; opacity: 0;
                transform: translateX(-24px);
            }

            .chat-pane {
                position: absolute; inset: 0; z-index: 20;
                transform: translateX(100%);
                transition: transform 0.45s var(--spring);
            }
            #s-app.mobile-chat-active .chat-pane { transform: translateX(0); }

            .back-b { display: flex; }

            .msgs { padding: 12px 10px; }
            .bubble { max-width: 85%; }
        }

        /* ── TABLET + DESKTOP (≥768px) ── */
        @media (min-width: 768px) {
            #s-app { flex-direction: row; }
            .chat-pane { flex: 1; }
            .back-b { display: none; }
            .ct-bar { padding-top: 14px; }
            .sb-header { padding-top: 20px; }
        }

        /* ── TABLET PORTRAIT (768–1024) ── */
        @media (min-width: 768px) and (max-width: 1024px) {
            :root { --sidebar: 300px; }
        }

        /* ── LARGE TABLET / DESKTOP (>1024px) ── */
        @media (min-width: 1025px) {
            :root { --sidebar: 360px; }
            .bubble { max-width: min(70%, 560px); }
        }
    </style>
</head>

<body class="no-select">
    <div id="toast"></div>

    <div id="overlay">
        <div class="ov-ring"></div>
        <div class="ov-txt" id="ov-txt">Connecting…</div>
    </div>

    <!-- ═══ BOOT ═══ -->
    <div class="screen active" id="s-boot">
        <div class="boot-icon">
            <div class="boot-icon-img squircle"></div>
        </div>
        <div class="boot-logo">Ci<em>pher</em></div>
        <div class="boot-progress-track">
            <div id="boot-prog"></div>
        </div>
        <div id="boot-lbl">Starting up…</div>
        <button id="boot-retry-btn" class="glass">
            <i data-lucide="refresh-cw" style="margin-right:6px;"></i> Retry
        </button>
    </div>

    <!-- ═══ AUTH ═══ -->
    <div class="screen" id="s-auth">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="auth-brand-icon squircle"></div>
                <div class="auth-brand-name">Ci<span>pher</span></div>
            </div>

            <div class="auth-tabs">
                <button class="ac-tab on" id="tab-in">Sign In</button>
                <button class="ac-tab" id="tab-up">Sign Up</button>
            </div>

            <!-- Sign Up -->
            <div id="f-up" style="display:none">
                <div class="auth-form">
                    <div class="field-group">
                        <label class="field-label">Your Name</label>
                        <input type="text" id="rn" class="field-input" placeholder="Alex" maxlength="24">
                        <div class="fe" id="e-rn"></div>
                    </div>
                    <div class="field-group">
                        <label class="field-label">Avatar Style</label>
                        <div class="av-row" id="av-row"></div>
                    </div>
                    <div class="field-group">
                        <label class="field-label">Password</label>
                        <div class="field-pwd-wrap">
                            <input type="password" id="rp" class="field-input" placeholder="••••••••">
                            <button class="pt" data-target="rp"><i data-lucide="eye"></i></button>
                        </div>
                        <div class="fe" id="e-rp"></div>
                    </div>
                    <div class="field-group">
                        <label class="field-label">Private Passphrase</label>
                        <div class="field-pwd-wrap">
                            <input type="password" id="rph" class="field-input" placeholder="Shared secret">
                            <button class="pt" data-target="rph"><i data-lucide="eye"></i></button>
                        </div>
                        <div class="fe" id="e-rph"></div>
                    </div>
                    <button id="btn-up" class="auth-btn">
                        <div class="btn-spin"></div>
                        <span class="btn-lbl">Create Account</span>
                        <i data-lucide="arrow-right" class="btn-icon"></i>
                    </button>
                    <div id="reg-full">Registration limit reached.</div>
                </div>
            </div>

            <!-- Sign In -->
            <div id="f-in">
                <div class="auth-form">
                    <div class="field-group">
                        <label class="field-label">Password</label>
                        <div class="field-pwd-wrap">
                            <input type="password" id="lp" class="field-input" placeholder="••••••••">
                            <button class="pt" data-target="lp"><i data-lucide="eye"></i></button>
                        </div>
                        <div class="fe" id="e-lp"></div>
                    </div>
                    <div class="field-group">
                        <label class="field-label">Private Passphrase</label>
                        <div class="field-pwd-wrap">
                            <input type="password" id="lph" class="field-input" placeholder="Shared secret">
                            <button class="pt" data-target="lph"><i data-lucide="eye"></i></button>
                        </div>
                        <div class="fe" id="e-lph"></div>
                    </div>
                    <div id="rl-msg"></div>
                    <button id="btn-in" class="auth-btn">
                        <div class="btn-spin"></div>
                        <span class="btn-lbl">Unlock Chat</span>
                        <i data-lucide="lock" class="btn-icon"></i>
                    </button>
                </div>
            </div>

            <div class="auth-security">
                <i data-lucide="shield" style="color:var(--a); width:20px; flex-shrink:0;"></i>
                <p>Your messages are private and fully secure.</p>
            </div>
        </div>
    </div>

    <!-- ═══ APP ═══ -->
    <div class="screen" id="s-app">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sb-header">
                <div class="sb-brand">
                    <div class="sb-brand-icon squircle"></div>
                    <div class="sb-brand-name">Ci<span>pher</span></div>
                </div>
                <div class="sb-actions">
                    <button id="theme-btn" class="sb-icon-btn glass"><i data-lucide="moon" style="width:16px;"></i></button>
                    <div class="dropdown" id="sb-dropdown">
                        <button id="sb-menu-btn" class="sb-icon-btn glass"><i data-lucide="more-vertical" style="width:16px;"></i></button>
                        <div class="dropdown-content">
                            <div id="logout-btn" class="dropdown-item"><i data-lucide="log-out" style="width:16px; color:var(--red);"></i> Sign Out</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="my-prof">
                <div class="av squircle" id="my-av" style="width:40px; height:40px; background:var(--a); font-size:16px;">?</div>
                <div class="my-prof-info">
                    <div id="my-n">Anonymous</div>
                    <div class="my-status-row">
                        <div class="pip online"></div>
                        <span class="my-s">Active</span>
                    </div>
                </div>
            </div>

            <div class="sb-section-label">Conversations</div>
            <div id="contacts" class="scrollable"></div>
        </div>

        <!-- CHAT PANE -->
        <div class="chat-pane" id="chat-pane">
            <div id="offline-bar" class="offline-bar" style="display:none">No Connection</div>

            <div id="chat-empty" class="chat-empty">
                <i data-lucide="message-square" style="width:52px; height:52px;"></i>
                <p>Select a contact to start chatting</p>
            </div>

            <div id="chat-ui" class="chat-ui-wrap" style="display:none">
                <div class="ct-bar">
                    <button id="back-btn" class="back-b glass"><i data-lucide="chevron-left"></i></button>
                    <div style="position:relative;">
                        <div class="av squircle" id="ct-av-el" style="width:40px; height:40px;">?</div>
                        <div id="ct-pip" class="ppip"></div>
                    </div>
                    <div class="ct-info">
                        <div id="ct-name-el">…</div>
                        <div id="ct-status-el" class="ct-s">Connecting…</div>
                    </div>
                    <div class="dropdown" id="ct-dropdown">
                        <button id="ct-menu-btn" class="sb-icon-btn glass"><i data-lucide="more-horizontal"></i></button>
                        <div class="dropdown-content">
                            <div id="export-btn" class="dropdown-item"><i data-lucide="download" style="width:16px;"></i> Save Chat</div>
                            <div id="chat-theme-btn" class="dropdown-item"><i data-lucide="palette" style="width:16px;"></i> Interface</div>
                        </div>
                    </div>
                </div>

                <div id="decoy-bar" class="decoy-bar" style="display:none">Passphrase mismatch.</div>

                <div id="decrypt-prog" class="decrypt-prog" style="display:none">
                    <div class="decrypt-prog-track"><div id="dp-fill"></div></div>
                    <div id="dp-lbl">Loading…</div>
                </div>

                <div id="msgs" class="msgs scrollable"></div>

                <div id="typing-r" class="typing-r" style="display:none">
                    <div class="av squircle" id="typing-av" style="width:24px; height:24px; font-size:9px;">?</div>
                    <div class="typing-dots glass">
                        <div class="td"></div>
                        <div class="td"></div>
                        <div class="td"></div>
                    </div>
                </div>

                <div id="reply-bar" class="reply-bar" style="display:none">
                    <div style="flex:1; min-width:0;">
                        <div class="reply-name">Replying to</div>
                        <div id="reply-text">…</div>
                    </div>
                    <button id="reply-close" class="reply-close-btn"><i data-lucide="x" style="width:14px;"></i></button>
                </div>

                <div class="inp-area">
                    <div class="inp-row">
                        <div class="inp-wrap">
                            <button id="em-btn"><i data-lucide="smile"></i></button>
                            <textarea id="msg-inp" placeholder="Type a message…" rows="1"></textarea>
                        </div>
                        <button id="send-b" disabled>
                            <i data-lucide="send" style="width:18px;"></i>
                        </button>
                    </div>
                    <div id="em-pick"></div>
                </div>
            </div>

            <button id="jump-btn">
                <i data-lucide="arrow-down" style="color:var(--t0); width:18px;"></i>
                <div id="unread-badge">0</div>
            </button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script>
        // Ensure Lucide is loaded before initial call
        function initIcons() {
            if (window.lucide) {
                window.lucide.createIcons();
            } else {
                setTimeout(initIcons, 100);
            }
        }
        window.addEventListener('DOMContentLoaded', initIcons);
        
        // Dynamic background motion
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth * 100;
            const y = e.clientY / window.innerHeight * 100;
            document.body.style.backgroundImage = `radial-gradient(circle at ${x}% ${y}%, var(--ag) 0%, transparent 60%)`;
        });
    </script>
</body>
</html>
